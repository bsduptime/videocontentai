[paths]
working_dir = "~/.videngine/jobs"

[whisper]
model_path = "~/.videngine/models/ggml-large-v3-turbo.bin"
language = "en"
threads = 4

[ai]
model = "claude-opus-4-20250115"
max_tokens = 8192
temperature = 0.3
target_total_duration = 300

[voice]
engine = "chatterbox"
reference_audio = "assets/voice_refs/founder.m4a"

[video]
# 1920x1920 masters — cropped to target aspect ratio during assembly
# Variants: default-1s.mp4, default-2s.mp4, default-4s.mp4
intro_template = "assets/intros/default-intro.mp4"
outro_template = "assets/outros/default-outro.mp4"
intro_format = "1920x1920"
watermark = "assets/watermarks/logo.png"
watermark_position = "bottom_right"
watermark_opacity = 0.3
watermark_scale = 0.08

[audio]
# Audio preprocessing profiles applied before loudness normalization.
# Profile is selected by cut spec or auto-detected from source metadata.
denoise = true                  # DeepFilterNet3 noise suppression

[audio.profiles.macbook]
denoise_atten_lim_db = 0        # 0 = unlimited denoise
compress_threshold_db = -20.0
compress_ratio = 3.0
compress_attack_ms = 5.0
compress_release_ms = 200.0
compress_knee_db = 6.0
compress_makeup_db = 2.0

[audio.profiles.iphone]
denoise_atten_lim_db = 0        # 0 = unlimited denoise
compress_threshold_db = -18.0
compress_ratio = 1.5
compress_attack_ms = 10.0
compress_release_ms = 250.0
compress_knee_db = 8.0
compress_makeup_db = 1.0

[background]
# Background replacement using RVM (Robust Video Matting).
# Disabled by default — enable per-job or globally.
enabled = false
background_type = "blur"       # "blur", "solid", "image"
background_image = ""          # path to image when type = "image"
blur_strength = 21             # boxblur radius (odd number, higher = more blur)
solid_color = "#1a1a2e"        # hex color when type = "solid"
downsample_ratio = 0.25        # RVM internal res (0.25 = fast, 0.5 = better edges)
model = "rvm"                  # "rvm" (future: "matanyone")

[encoding]
codec = "libx264"
crf = 20
audio_codec = "aac"
audio_bitrate = "192k"
