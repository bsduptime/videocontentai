[paths]
working_dir = "~/.videngine/jobs"

[whisper]
model_path = "~/.videngine/models/ggml-large-v3-turbo.bin"
language = "en"
threads = 4

[ai]
model = "claude-opus-4-20250115"
max_tokens = 8192
temperature = 0.3
target_total_duration = 300

[voice]
engine = "chatterbox"
reference_audio = "assets/voice_refs/founder.m4a"

[video]
# 1920x1920 masters — cropped to target aspect ratio during assembly
# Variants: default-1s.mp4, default-2s.mp4, default-4s.mp4
intro_template = "assets/intros/default-intro.mp4"
outro_template = "assets/outros/default-outro.mp4"
intro_format = "1920x1920"
watermark = "assets/watermarks/logo.png"
watermark_position = "bottom_right"
watermark_opacity = 0.3
watermark_scale = 0.08

[encoding]
codec = "libx264"
crf = 20
audio_codec = "aac"
audio_bitrate = "192k"
