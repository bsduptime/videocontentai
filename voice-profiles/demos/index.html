<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Profiles</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 20px; background: #111; color: #eee; }
  h1 { font-size: 1.4em; margin-bottom: 30px; }
  .profile { margin-bottom: 28px; }
  .profile h2 { font-size: 1em; margin: 0 0 8px; color: #adf; text-transform: capitalize; }
  .row { display: flex; align-items: center; gap: 12px; margin-bottom: 4px; }
  .row label { width: 80px; font-size: 0.8em; color: #888; flex-shrink: 0; }
  audio { flex: 1; height: 36px; }
</style>
</head>
<body>
<h1>Chatterbox Voice Profiles</h1>

<div class="profile">
  <h2>Drive</h2>
  <div class="row"><label>Original</label><audio controls src="original-drive.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="drive-demo.wav"></audio></div>
</div>

<div class="profile">
  <h2>Drive + Wonder</h2>
  <div class="row"><label>Original</label><audio controls src="original-drive-wonder.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="drive-wonder-demo.wav"></audio></div>
</div>

<div class="profile">
  <h2>Tension</h2>
  <div class="row"><label>Original</label><audio controls src="original-tension.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="tension-demo.wav"></audio></div>
</div>

<div class="profile">
  <h2>Tension + Vulnerability</h2>
  <div class="row"><label>Original</label><audio controls src="original-tension-vulnerability.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="tension-vulnerability-demo.wav"></audio></div>
</div>

<div class="profile">
  <h2>Steady</h2>
  <div class="row"><label>Original</label><audio controls src="original-steady.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="steady-demo.wav"></audio></div>
</div>

<div class="profile">
  <h2>Steady + Empathy</h2>
  <div class="row"><label>Original</label><audio controls src="original-steady-empathy.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="steady-empathy-demo.wav"></audio></div>
</div>

<div class="profile">
  <h2>High-Intensity Drive</h2>
  <div class="row"><label>Original</label><audio controls src="original-high-intensity-drive.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="high-intensity-drive-demo.wav"></audio></div>
</div>

<div class="profile">
  <h2>Reflective Calm</h2>
  <div class="row"><label>Original</label><audio controls src="original-reflective-calm.wav"></audio></div>
  <div class="row"><label>Clone</label><audio controls src="reflective-calm-demo.wav"></audio></div>
</div>

</body>
</html>
